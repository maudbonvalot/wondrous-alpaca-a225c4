<div id="page-recettes" class="page">
  <div class="section-header">
    <span class="section-tag">Cuisine & Nutrition</span>
    <h2>Recettes <em>Protéinées</em></h2>
    <p>Des recettes savoureuses, riches en protéines et adaptées au reset métabolique féminin. Ajuste les quantités selon ton besoin.</p>
  </div>

  <div style="max-width: 1100px; margin: 0 auto; padding: 0 40px 80px;">

    <!-- FILTRES CATÉGORIES -->
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:32px; justify-content:center;">
      <button class="recette-filter active" onclick="filterRecettes(this,'all')">✦ Toutes</button>
      <button class="recette-filter" onclick="filterRecettes(this,'petitdej')">🌅 Petit-déjeuner</button>
      <button class="recette-filter" onclick="filterRecettes(this,'dejeuner')">☀️ Déjeuner</button>
      <button class="recette-filter" onclick="filterRecettes(this,'diner')">🌙 Dîner</button>
      <button class="recette-filter" onclick="filterRecettes(this,'collation')">🍎 Collation</button>
    </div>

    <!-- TOGGLE PORTIONS -->
    <div style="display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:40px;">
      <span style="font-size:13px; color:var(--warm-gray); margin-right:16px;">Portions :</span>
      <div style="display:flex; background:white; border-radius:30px; border:1.5px solid var(--gold-light); overflow:hidden; box-shadow:0 2px 10px rgba(44,36,32,0.06);">
        <button id="portion-1" class="portion-toggle active" onclick="setPortions(1)">1 portion</button>
        <button id="portion-4" class="portion-toggle" onclick="setPortions(4)">4 portions</button>
      </div>
    </div>

    <!-- GRILLE RECETTES (générée dynamiquement) -->
    <div class="recettes-grid" id="recettes-grid"></div>

  </div>
</div>

<div id="recette-modal" style="display:none; position:fixed; inset:0; z-index:200; background:rgba(44,36,32,0.55); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
  <div id="modal-inner" style="background:var(--warm-white); border-radius:24px; max-width:640px; width:92%; max-height:88vh; overflow-y:auto; position:relative; box-shadow:0 24px 80px rgba(44,36,32,0.25);">
    <button onclick="closeRecette()" style="position:sticky; top:16px; float:right; margin:16px 16px 0 0; background:var(--gold-light); border:none; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; color:var(--deep-rose);">✕</button>
    <div id="modal-content" style="padding:36px;"></div>
  </div>
</div>
