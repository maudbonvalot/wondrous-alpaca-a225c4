<!DOCTYPE html>

  <head>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/protected/styles.css">
    <script src="/shared/meta-pixel.js"></script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1755229992107435&ev=PageView&noscript=1" alt="" /></noscript>
  </head>
<body>
  <script src="/protected/auth-guard.js"></script>

<nav>
  <div class="nav-logo">Reset Métabolique ✦</div>
  <button class="nav-toggle" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <button onclick="showPage('home')" id="nav-home" class="active">Accueil</button>
    <button onclick="showPage('programme')" id="nav-programme">Programme</button>
    <button onclick="showPage('recettes')" id="nav-recettes">Recettes</button>
    <button onclick="showPage('cycle')" id="nav-cycle">Mon Cycle</button>
    <button onclick="showPage('tracker')" id="nav-tracker">Tracker</button>
    <button onclick="showPage('courses')" id="nav-courses">Courses</button>
    <button onclick="logout()" style="margin-left: auto; background: var(--terracotta); color: white;">Déconnexion</button>
  </ul>
</nav>

<!-- Container pour les pages chargées dynamiquement -->
<div id="pages-container"></div>

<!-- MODAL RECETTE (reste global) -->
<div id="recette-modal" style="display:none; position:fixed; inset:0; z-index:200; background:rgba(44,36,32,0.55); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
  <div id="modal-inner" style="background:var(--warm-white); border-radius:24px; max-width:640px; width:92%; max-height:88vh; overflow-y:auto; position:relative; box-shadow:0 24px 80px rgba(44,36,32,0.25);">
    <button onclick="closeRecette()" style="position:sticky; top:16px; float:right; margin:16px 16px 0 0; background:var(--gold-light); border:none; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; color:var(--deep-rose);">✕</button>
    <div id="modal-content" style="padding:36px;"></div>
  </div>
</div>

<script src="/protected/page-loader.js"></script>
<script src="/protected/app.js"></script>

</html>
